services:
  crazyplayground:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: crazyplayground:2.3.0
    container_name: crazyplayground
    env_file:
      - .env
    environment:
      - DISPLAY
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      # X11 (GUI opcional)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      # Isaac Sim cache — reutiliza o cache do isaac-arenas
      - ${HOME}/docker/isaac-lab/cache/kit:/isaac-sim/kit/cache:rw
      - ${HOME}/docker/isaac-lab/cache/ov:/root/.cache/ov:rw
      - ${HOME}/docker/isaac-lab/cache/pip:/root/.cache/pip:rw
      - ${HOME}/docker/isaac-lab/cache/glcache:/root/.cache/nvidia/GLCache:rw
      - ${HOME}/docker/isaac-lab/cache/computecache:/root/.nv/ComputeCache:rw
      - ${HOME}/docker/isaac-lab/logs:/root/.nvidia-omniverse/logs:rw
      - ${HOME}/docker/isaac-lab/data:/root/.local/share/ov/data:rw
      # Projeto (código live + logs persistidos)
      - /home/luisa_francielle/CrazyPlayGround:/workspace/CrazyPlayGround:rw
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Training targets ────────────────────────────────────────────────────────

  train-skrl:
    extends: crazyplayground
    container_name: crazyplayground-train-skrl
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: >
      /workspace/isaaclab/isaaclab.sh -p
      /workspace/CrazyPlayGround/scripts/skrl/train.py
      --task=${TASK:-Vel-Hovering}
      --num_envs=${NUM_ENVS:-4096}

  train-rsl-rl:
    extends: crazyplayground
    container_name: crazyplayground-train-rsl-rl
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: >
      /workspace/isaaclab/isaaclab.sh -p
      /workspace/CrazyPlayGround/scripts/rsl_rl/train.py
      --task=${TASK:-Pos-Hovering}
      --num_envs=${NUM_ENVS:-4096}

  train-sb3:
    extends: crazyplayground
    container_name: crazyplayground-train-sb3
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: >
      /workspace/isaaclab/isaaclab.sh -p
      /workspace/CrazyPlayGround/scripts/sb3/train.py
      --task=${TASK:-Att-Hovering}
      --num_envs=${NUM_ENVS:-512}
      ${HEADLESS:-}
